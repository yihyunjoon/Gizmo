# Gizmo config file
# Location: $XDG_CONFIG_HOME/gizmo/config.toml (fallback: ~/.config/gizmo/config.toml)

config-version = 1

[launcher]
display = "active_window" # primary | mouse | active_window
force_english_input_source = false

[launcher.global_hotkey]
key = "space"
modifiers = ["command"] # command | shift | option | control | function

[custom_menubar]
enabled = false
border = true
display_scope = "primary" # all | active | primary
position = "bottom" # top | bottom
height = 30
widgets = [] # custom widget names from [custom_widgets.<name>]
background_opacity = 0.75
horizontal_padding = 8

# [custom_widgets.battery]
# shell_command = "pmset -g batt | tail -n 1"
# refresh_interval = 10
# widget_alignment = "right" # left | center | right

[workspace]
enabled = true
mode = "primary_only" # primary_only | per_display | unified
hide_strategy = "corner_offscreen" # corner_offscreen

[workspace.display_sets.primary]
names = ["q", "w", "e", "r", "t"]

[workspace.display_sets.secondary]
names = ["3", "4"]

[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 4
outer.top = 4
outer.right = 4
outer.bottom = 4

[keystats]
auto_start_monitoring = true
